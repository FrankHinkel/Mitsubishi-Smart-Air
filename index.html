<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Air</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/sun-snow.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="login-view" id="loginView">
        <form class="login-panel" id="loginForm">
          <p class="eyebrow">WF-RAC local</p>
          <h1 id="loginTitle">Smart Air</h1>

          <label>
            <span>Username</span>
            <input id="loginUsername" name="username" autocomplete="username" value="admin" required>
          </label>

          <label>
            <span>Password</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" value="admin" required>
          </label>

          <button class="primary" type="submit" id="loginButton">Sign in</button>
          <p class="message error" id="loginError" hidden></p>
        </form>
      </section>

      <section class="app-view" id="appView" hidden>
        <header class="topbar">
          <div class="brand">
            <p class="eyebrow">Mitsubishi local control</p>
            <div class="brand-line">
              <h1 id="brandTitle">Smart Air</h1>
              <output id="outdoorSummary">Outdoor --</output>
            </div>
          </div>

          <nav class="top-actions" aria-label="Application actions">
            <button class="secondary" type="button" id="refreshAllButton" aria-label="Refresh all devices" title="Refresh all devices"></button>
            <button class="secondary" type="button" id="editListButton" aria-label="Edit device list" title="Edit device list"></button>
            <div class="top-zoom-menu symbol-menu">
              <button class="secondary" type="button" id="zoomMenuButton" aria-label="Page zoom" title="Page zoom"></button>
              <div class="popup-menu zoom-menu" id="zoomMenu" hidden>
                <button type="button" id="zoomOutButton" aria-label="Zoom out" title="Zoom out"></button>
                <output class="zoom-value" id="zoomValue">100%</output>
                <button type="button" id="zoomInButton" aria-label="Zoom in" title="Zoom in"></button>
              </div>
            </div>
            <button class="ghost" type="button" id="logoutButton" aria-label="Logout" title="Logout"></button>
          </nav>
        </header>

        <p class="message" id="globalMessage" hidden></p>

        <section class="empty-state" id="emptyState" hidden>
          <div>
            <p class="eyebrow">Devices</p>
            <h2>No air conditioners found</h2>
          </div>
          <div class="empty-actions">
            <button class="secondary" type="button" id="emptyManualButton">Add manually</button>
            <button class="primary" type="button" id="emptyScanButton">Scan network</button>
          </div>
        </section>

        <section class="device-list" id="deviceList" aria-label="Managed air conditioners"></section>

        <section class="edit-panel" id="editPanel" hidden>
          <header class="edit-header">
            <div>
              <p class="eyebrow">List</p>
              <h2>Edit devices</h2>
            </div>
            <button class="ghost" type="button" id="closeEditButton">Close</button>
          </header>

          <section class="app-settings-panel" aria-label="Application settings">
            <label class="app-title-field">
              <span>Title</span>
              <input id="appTitleInput" name="appTitle" autocomplete="off" placeholder="Smart Air">
            </label>
          </section>

          <form class="manual-add-form" id="manualAddForm">
            <div class="manual-add-grid">
              <label>
                <span>Name</span>
                <input id="manualName" name="manualName" autocomplete="off" placeholder="Hallway">
              </label>

              <label>
                <span>IP address</span>
                <input id="manualIpAddress" name="manualIpAddress" inputmode="decimal" placeholder="192.168.178.84" required>
              </label>

              <label>
                <span>Port</span>
                <input id="manualPort" name="manualPort" inputmode="numeric" value="51443">
              </label>

              <label>
                <span>Protocol</span>
                <select id="manualProtocol" name="manualProtocol">
                  <option value="auto">Auto</option>
                  <option value="http">HTTP</option>
                  <option value="https">HTTPS</option>
                </select>
              </label>
            </div>

            <div class="manual-add-actions">
              <p class="manual-add-copy">Add a device directly when network scan does not find it.</p>
              <button class="primary" type="submit" id="manualAddButton">Add device</button>
            </div>
          </form>

          <div class="edit-list" id="editList"></div>

          <div class="edit-actions">
            <button class="secondary" type="button" id="rescanEditButton">Scan</button>
            <button class="primary" type="button" id="saveListButton">Save list</button>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>

services:
  smart-air:
    build: .
    container_name: mitsubishi-smart-air
    restart: unless-stopped
    network_mode: host
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 13920
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin
      MAC_PREFIXES: a0:43:b0
      SCAN_PORTS: 51443
      SCAN_SUBNETS: ${SCAN_SUBNETS:-192.168.178.0/24}
      SCAN_TIMEOUT_MS: 1200
      STATUS_POLL_INTERVAL_MS: 60000
      SLEEP_TIMER_CHECK_INTERVAL_MS: 30000
      SLEEP_TIMER_RETRY_DELAY_MS: 180000
      SLEEP_TIMER_MAX_RETRIES: 3
    volumes:
      - smart-air-data:/data

volumes:
  smart-air-data:
